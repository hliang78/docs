credential:
  providers:
    vault:
      enabled: true
      address: "http://127.0.0.1:8200"
      token: "<REDACTED_VAULT_TOKEN>"
      namespace: ""
      timeout_seconds: 5
      insecure_skip_verify: false
      handle_signing_key: "oneops-quick-env-vault-handle-signing-key"
      handle_ttl_seconds: 300
      handle_single_use: true
      credentials:
        - code: "vault_linux_ops"
          name: "Linux Ops"
          type: "ssh_account"
          usage: "inband"
          path: "kv/data/oneops/secrets/linux_ops"
          field_mapping:
            username: "username"
            password: "password"
            private_key: "private_key"
            auth_pass: "auth_pass"
          description: "Quick env linux ssh credential from Vault"
        - code: "vault_snmp_default"
          name: "SNMP Default"
          type: "snmp_community"
          usage: "snmp_inband"
          path: "kv/data/oneops/communities/snmp_default"
          field_mapping:
            community: "community"
          description: "Quick env snmp community from Vault"
        - code: "vault_git_prod"
          name: "Git Prod"
          type: "http_basic"
          usage: "change_execution"
          path: "kv/data/oneops/git/prod"
          field_mapping:
            username: "username"
            password: "password"
            token: "token"
          description: "Quick env local Gitea credential from Vault"
