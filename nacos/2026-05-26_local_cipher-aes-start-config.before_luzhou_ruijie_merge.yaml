    controller: "http://127.0.0.1:8081"
    jumpServer:
      host: "127.0.0.1"
      port: 50022
      username: "root"
      password: "your-password"
      enable: true

agentConfig:
  agent:
    name: "oneops-agent"
    vars:
      - workspace: "/opt/oneops-packs"
      - is_user_unit: "true"
      - enable_lingering: "true"
      - grpc_port: 10380
      - http_port: 10381
      - debug: false
      - enable_console: false
      - pack_discovery_interval: 10
      - etcd_connect_timeout: 5s
  packages: []

# healing_actions.yaml
HealingActions:
  clean_disk_space:
    description: "Clean up disk space using various strategies"
    deviceTypes: ["server", "network_device"]
    strategies:
      - name: "remove_old_logs"
        type: "command"
        command: "find {{.path}} -type f -mtime +{{.days}} -delete"
      - name: "compress_logs"
        type: "script"
        scriptPath: "/scripts/compress_logs.sh"
    params:
      - name: path
        required: true
        allowedValues: ["/var/log", "/tmp", "/home"]
        description: "Target directory for cleanup"
      - name: days
        required: false
        default: "30"
        description: "Age of files to be cleaned (in days)"
    validation:
      successCondition: "contains(output, 'cleaned') || contains(output, 'compressed')"
      failureCondition: "contains(output, 'error') || contains(output, 'permission denied')"
    timeout: "1h"
    retries: 3
    tags: ["disk", "maintenance"]

  restart_service:
    description: "Restart a system service"
    deviceTypes: ["server"]
    strategies:
      - name: "systemctl_restart"
        type: "command"
        command: "systemctl restart {{.service_name}}"
      - name: "custom_restart"
        type: "script"
        script: |
          #!/bin/bash
          echo "Starting custom restart procedure"
          systemctl stop service_name
          sleep 2
          systemctl start service_name
          echo "Restart completed"
    params:
      - name: service_name
        required: true
        description: "Name of the service to restart"
    validation:
      successCondition: "contains(output, 'Active: active (running)')"
      failureCondition: "contains(output, 'Failed to restart')"
    timeout: "5m"
    retries: 2
    tags: ["service", "maintenance"]

  reset_network_interface:
    description: "Reset a network interface"
    deviceTypes: ["switch", "router"]
    strategies:
      - name: "cli_reset"
        type: "command"
        command: "interface {{.interface_name}}; shutdown; no shutdown"
      - name: "api_reset"
        type: "api"
        apiEndpoint: "/api/v1/interfaces/{{.interface_name}}/reset"
    params:
      - name: interface_name
        required: true
        description: "Name of the interface to reset"
    validation:
      successCondition: "contains(output, 'interface is up') || statusCode == 200"
      failureCondition: "contains(output, 'Error:') || statusCode >= 400"
    timeout: "2m"
    retries: 1
    tags: ["network", "interface"]

planLayout:
  - block:
      device_name: "FW-HX"
      area:
        - name: Internet
          type: IPv4
