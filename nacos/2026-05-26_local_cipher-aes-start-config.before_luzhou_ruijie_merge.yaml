flexmapping:
  after:
    rules:
      - fields:
          - new_version: Platform
        functions:
          new_version: db
      - fields:
          - catalog: Catalog
        functions:
          catalog: db
  before:
    rules:
      - fields:
          - RackPosition: \(([\d+A-Za-z-]+)
        functions:
          StartU: RE
      - fields:
          - InBandIP: true
          - OutBandIP: true
  mapping:
    - rules:
        - fields:
            - Version:
                - red
                - rhel
                - rehl
                - rh
          functions:
            Version: In
          map: redhat
        - fields:
            - Version:
                - debian
                - deb
          functions:
            Version: In
          map: Debian
        - fields:
            - Version:
                - almaLinux
                - alma
          functions:
            Version: In
          map: AlmaLinux
        - fields:
            - Version:
                - ubun
          functions:
            Version: In
          map: ubuntu
        - fields:
            - Version:
                - esxi
          functions:
            Version: In
          map: esxi
        - fields:
            - Version:
                - aix
          functions:
            Version: In
          map: aix
        - fields:
            - Version:
                - centos
          functions:
            Version: In
          map: Centos
        - fields:
            - Version:
                - win
          functions:
            Version: In
          map: Windows
        - fields:
            - Version:
                - vm
          functions:
            Version: In
          map: Vmware
        - fields:
            - Version:
                - comware
                - 交换机
          functions:
            Version: In
          map: Comware
      targetFiled: new_version
    - rules:
        - fields:
            - DeviceType: '!交换机'
            - AttributionType: 网络设备
          functions:
            Version: In
          map: Network
        - fields:
            - DeviceType:
                - ASA
                - FortiGate
                - SecPath
                - FWNFV
                - USG
                - SangforOS
            - AttributionType: 网络设备
          functions:
            Version: In
          map: FIREWALL
        - fields:
            - DeviceType:
                - F5
            - AttributionType: 网络设备
          functions:
            Version: In
          map: LoadBalance
        - fields:
            - DeviceType:
                - Nexus
                - IOS
                - '交换机'
                - Comware
                - HuaWei
                - Ruijie
                - INOS
                - ANSHI
            - AttributionType: 网络设备
          functions:
            Version: In
          map: Switch
        - fields:
            - DeviceType:
                - '路由器'
            - AttributionType: 网络设备
          functions:
            Version: In
          map: Router
        - fields:
            - DeviceType:
                - Comware
                - Ruijie
            - AttributionType: 路由器
          functions:
            Version: In
          map: Router
        - fields:
            - InBandIP: false
            - OutBandIP: true
            - AttributionType: 主机设备
          map: Hypervisor
        - fields:
            - Version:
                - red
                - rhel
                - centos
                - Ubuntu
                - almaLinux
                - alma
                - debian
                - deb
                - rh
                - reh
            - AttributionType: 主机设备
          functions:
            Version: In
          map: Server
        - fields:
            - Version:
                - esxi
            - AttributionType: 主机设备
          functions:
            Version: In
          map: Hypervisor
        - fields:
            - Version:
                - aix
            - AttributionType: 主机设备
          functions:
            Version: In
          map: others
        - fields:
            - Version:
                - win
            - AttributionType: 主机设备
          functions:
            Version: In
          map: Windows
        - fields:
            - AttributionType: IB网络设备
          functions:
            Version: In
          map: InfinibandSwitch
        - fields:
            - AttributionType: 安全设备
          map: security
        - fields:
