rpc:
  prefix: "/rpcx"
  tls:
    enable: true                                # 是否启用TLS
    certFile: "./certs/client.crt"              # 客户端证书文件路径(可选，用于双向认证，TLS 并不强制客户端必须提供证书，除非服务端启用了 mTLS)
    keyFile: "./certs/client.key"               # 客户端私钥文件路径(可选，用于双向认证，TLS 并不强制客户端必须提供证书，除非服务端启用了 mTLS)
    caFile: "./certs/ca.crt"                    # CA证书文件路径(可选，用于验证服务端证书)
    insecureSkipVerify: false                   # 是否跳过证书验证
