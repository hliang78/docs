    prod: http://127.0.0.1:9090
  lokiNodes:
    prod: http://127.0.0.1:3100

storeProcess:
  - name: "登录信息准备"
    phase: "RemoteInfoPrepare"

  - name: "信息采集"
    phase: "InfoCollection"

  - name: "采集数据处理"
    phase: "CollectionDataProcess"

  - name: "数据校验"
    phase: "validationChains"

  - name: "设备入库"
    phase: "DeviceStore"

  - name: "入库后处理"
    phase: "AfterStore"

infoCollection:
  sets:
    - catalog: Server
      stepName: META
      actions:
        - name: IsAlive
        # - name: NetworkDeviceSerialTable
        - name: NetworkDeviceVersion
        - name: DeviceMeta
          options:
            - "ip a"
      stopOnFailure:
        - IsAlive
    - catalog: Switch
      stepName: META
      actions:
        - name: IsAlive
        # - name: NetworkDeviceSerialTable
        - name: NetworkDeviceVersion
        - name: NetworkDevicePorts
      stopOnFailure:
        - IsAlive

collectionDataProcess:
  - name: "基础信息处理"
  - name: "带内连通性处理"
  - name: "带外连通性处理"
  - name: "设备序列号处理"
  - name: "设备版本信息采集"
  - name: "设备配置检查"

validations:
  - name: RACK_RESOURCES_FIELD
    enabled: true
  - name: IP_ADDRESS_FIELD
    enabled: true
  - name: WORKER_DEVICE_IP_FIELD
    enabled: true
  - name: KNIFE_FRAME_FIELD
    enabled: true
  - name: DEVICE_TYPE_FIELD
    enabled: true
  - name: RACK_POSITION_FORMAT_FIELD
    enabled: true
  - name: DEVICE_SN_FIELD
    enabled: false
  - name: HA_TYPE_FIELD
    enabled: true
  - name: HA_CLUSTER_FIELD
    enabled: true
  - name: MustFieldExist
    enabled: true
    description: "Validates that required fields exist"
  - name: OneOfFieldExist
    enabled: true
    description: "Ensures at least one of a set of fields exists"
  - name: DeviceRackExist
    enabled: true
    description: "Checks if the specified device rack exists"
  - name: DeviceSiteExist
