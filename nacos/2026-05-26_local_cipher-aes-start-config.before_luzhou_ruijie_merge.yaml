    categories: [ "network", "performance" ]
    tags: [ "interface", "traffic" ]
    range: [ 0, null ]  # 下限为0，上限不设置
    aggregation: "sum"  # 多接口数据如何聚合
    retention:
      raw: "2w"  # 原始数据保留2周
      1h: "3m"   # 1小时聚合数据保留3个月
