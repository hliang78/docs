EXTRA_RULES=$'D2 FE must not modify OneOPS/**.\nLong-running operator authorization is active until D2 completes: D2/device-related old frontend code may be modified only when existing old-code behavior is preserved.\nUse d2-fe-context.md, d2-phase2-real-operability.md, plus handoff as the first source of truth; open COORDINATION.md/shared-d2.md only for exact sections that must be updated or verified.\nRecord FE/BE contract gaps in COORDINATION.md, shared-d2.md, and evidence when a concrete new gap is found.\nDo not add fallback branches, mock data, swallowed errors, or silent defaults for missing backend capability.\nThis reactivation is production-readiness work, not wiring-only work: every visible page field must map to a real API/query/user-input/business-empty source.\nD2 Phase 2 must not be closed by screenshots, HTTP 200, page-title checks, typecheck, or refresh-button evidence alone; completion requires deterministic real operation evidence or precise BLOCKED questions.\nBefore browser validation, rely on the precheck output: the backend must be running from /Users/huangliang/project/OneOPS-ALL/OneOPS via go run main.go on http://127.0.0.1:8080, and the Vite proxy target is that backend.\nKeep `npm run smoke:d2-redesign-browser` only as a reachability check. Build and use a real-operation smoke for create/edit/delete, ingest, import batch, handoff, and store/task evidence before claiming DONE on Phase 2.\nIf any field source, enum, transform, test data, missing-contract handling, or old-code behavior boundary is unclear, stop that item, write the concrete question, and do not decide privately.\nAny old-code behavior change, route/menu/permission behavior change outside D2/device scope, production route switch, dependency change, migration, destructive operation, commit, or push still requires APPROVAL/BLOCKED.\nDo not replace real online readiness with screenshots, HTTP 200 checks, or degraded validation.'
