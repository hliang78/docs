EXTRA_RULES=$'User authorized code development for this task without additional approval when old behavior is preserved and scope stays local to Device V2 onboarding.\nUser authorized using server and network-device records from the database for real remote-login discovery and validation of log files, log-forwarding commands, switch syslog commands, and SNMP trap commands.\nDiscovery helpers are development/test tools only. Business features must not use these helpers for remote server operations; all business remote-server operations must go through controller-provided APIs.\nDevelopment documents must be generated and maintained under docs/development/device-v2-onboarding-observability/ using docs/development-doc-templates formats, not under the PRD directory.\nKeep long-running work context-light: read only the current story, required summaries, and targeted code snippets; write durable findings to evidence summaries instead of carrying large context.\nFrontend visual validation may use Chrome DevTools against http://127.0.0.1:3001/#/device/device-v2-management-redesign with the provided admin test account.\nThe worker may take over the backend runtime and restart the backend when needed for testing; record restart actions in evidence.\nFor testing only, the worker may perform read-only access to the authorized MySQL test database and may call backend APIs with the authorized X-Auth-Token; do not persist these credentials in code, generated docs, config, or evidence.\nDiscovery helpers may remotely log in and run read-only inspection commands against selected database devices; configuration-changing remote commands require the active story to explicitly be an ensure/apply story.\nDo not create fallback branches, degraded modes, mock success, pseudo-success, silent empty defaults, or intelligent inference for missing facts.\nExpose missing contracts, remote command failures, backend errors, and invalid state early; fail/BLOCKED with concrete evidence instead of swallowing errors.\nDo real execution only. Remote configuration actions must either execute through an explicit contract/template or stop as BLOCKED; do not simulate success.\nDo not make global frontend/backend changes: no global API contract changes, global style changes, auth/tenant semantics changes, dependency upgrades, migrations, commits, pushes, deploys, or production config changes.\nFirst phase is single-device onboarding only; batch work may generate plans or show per-device results but must not perform batch execution.\nIn this runtime, avoid exec/shell for search, grep, jq, or file inspection unless the story explicitly requires a side-effectful command. Prefer direct read/edit/browser tools on the exact files named in the current story, evidence, and docs.\nDo not mark a story DONE just because exec-based exploration or validation is disallowed; if a required action is blocked by tool/runtime limits, return BLOCKED with the concrete blocker instead.'
