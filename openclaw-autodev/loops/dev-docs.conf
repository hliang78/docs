EXTRA_RULES=$'本 loop 治理中文工程文档候选稿，当前默认方向是 Device V2 入库与设备管理；未来新方向必须先由 oneops-engineering-docs-standardization/story-generation-guide.md 定义方向包。\n本轮候选标准文档范围只包含 docs/development-doc-templates/01 到 07：需求概要、功能清单、实体属性清单、原型清单、数据库设计、接口文档、后端开发设计；不得生成 08 到 11 的测试、自动化脚本、接口调用或代码审查文档，除非用户明确扩展模板范围。\n生成既有功能文档时必须使用 docs/development-doc-templates/** 作为标准文档结构来源。\n必须先选择具体模板文件，保留模板章节结构，再读取当前真实代码，提取真实模型/表/字段、真实 API route/method/handler、真实 DTO、真实状态值、真实前端 request wrapper、真实服务逻辑和测试/evidence。\n代码事实提取阶段必须阅读足够源码：route/router、API handler/controller、request/response DTO、model/entity、service interface、service implementation、repository/DAO/GORM 查询更新、前端 API wrapper、前端页面/组件、测试/脚本/evidence 和相关文档；不得只凭 rg 搜索结果或少量 router/model 片段生成候选文档。\n每个候选文档或对应 evidence 必须包含代码事实来源清单，记录已读取关键文件、对应事实、未确认范围和待人工确认项。\n必须把源码事实填充进模板结构，形成候选文档内容；不得只输出松散事实清单，也不得随意新增模板外的大章节。\n必须明确区分 标准文档结构、当前真实代码事实、候选文档内容、AI 推导建议、规划缺口；不得把候选模型/API/状态机/流程写成当前事实。\n文档重点必须是模板结构中的代码、代码规划、业务规划、实施切片和风险缺口；不得用大量篇幅讨论文档流转、版本、合并等议题。\n生成 story package 时必须使用方向包，默认 dependency-chain，默认拆成 01-02、03-04、05-06、07 四个小 story，package/story 均先保持 draft。\n不得确认产品需求、架构决策、API 契约、数据库字段、权限模型、fixture、性能目标、采集协议、删除策略或验收标准。\n所有未确认信息必须保留为 [待确认]、[待人工确认:<role>]、[待补充] 或 [候选方案: AI 提炼]。\n输出文档必须保持 blocked-human-confirmation 或 code-fact-and-planning-draft，不得提升为 reviewed/active，不得作为开发或验收依据。\n不得修改产品代码、D2 PRD、生产配置、凭证、migration 或外部集成。'
READ_BUDGET_RULES=$'优先读取 oneops-engineering-docs-standardization PRD、story-generation-guide.md、docs/development-doc-templates/README.md，以及 01-07 中与目标文档类型对应的具体模板文件；不要读取 08-11 模板，除非用户重新要求。\n结构优先：先确定模板文件和章节结构，再用 rg 定位入口；定位后必须继续阅读 route/router、handler/controller、DTO、model、service interface、service implementation、DAO/GORM 调用、frontend request wrapper、页面/组件和测试/evidence 摘要，形成足够代码理解。\n不要整篇读取大型 evidence JSON；需要证据时先用 rg 定位摘要 markdown。不得只读取搜索结果就生成候选文档，必须在文档或 evidence 中输出代码事实来源清单。'
